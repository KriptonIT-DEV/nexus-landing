server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Salud simple para Cloud Run / checks
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Sitio estatico Astro servido en la raiz.
    # Astro emite about/index.html, plans/index.html, etc. -> $uri/ cubre los directorios.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # gzip basico
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
